<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>University of Science &amp; Strategic Research</title>
<meta name="description" content="Established in 2026, the University of Science &amp; Strategic Research is a research institution in Moscow advancing fundamental science across nine interdisciplinary directions." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Unbounded:wght@500;600;700&display=swap">

<style>
  :root{
    --ink:        #0E1B2C;
    --ink-2:      #1B2A40;
    --paper:      #F4EFE6;
    --paper-2:    #ECE5D6;
    --copper:     oklch(0.66 0.12 55);
    --copper-ink: oklch(0.42 0.10 55);
    --rule:       rgba(14,27,44,0.14);
    --muted:      rgba(14,27,44,0.62);
    --serif:      "Spectral", "Iowan Old Style", Georgia, serif;
    --sans:       "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
    --mono:       "IBM Plex Mono", ui-monospace, Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit;text-decoration:none}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:500;letter-spacing:-0.01em;margin:0;text-wrap:balance}
  p{text-wrap:pretty}

  /* ── Layout ── */
  .wrap{max-width:1280px;margin:0 auto;padding:0 32px}
  .rule{height:1px;background:var(--rule);width:100%}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}

  /* ── Header ── */
  header.site{
    position:sticky;top:0;z-index:20;
    background:rgba(244,239,230,0.86);
    backdrop-filter:blur(10px) saturate(140%);
    -webkit-backdrop-filter:blur(10px) saturate(140%);
    border-bottom:1px solid var(--rule);
  }
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;padding:18px 32px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{width:46px;height:46px;display:flex;align-items:center;justify-content:center}
  .brand .logo svg{display:block;width:100%;height:100%}
  .brand .wm{display:flex;flex-direction:column;line-height:1.05}
  .brand .wm .name{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:0.005em}
  .brand .wm .tag{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:3px}

  nav.primary{display:flex;align-items:center;gap:30px;font-size:14px;font-weight:500}
  nav.primary a{color:var(--ink);opacity:0.78;position:relative;padding:6px 0}
  nav.primary a:hover{opacity:1}

  /* ── Language toggle ── */
  .lang-toggle{
    display:inline-flex;align-items:center;gap:6px;
    margin-left:18px;padding:6px 10px;
    border:1px solid var(--rule);border-radius:999px;
    font-family:var(--mono);font-size:11px;letter-spacing:0.08em;
  }
  .lang-toggle .lang-opt{
    background:transparent;border:0;padding:2px 4px;margin:0;
    color:var(--ink);opacity:0.55;cursor:pointer;
    font-family:inherit;font-size:inherit;letter-spacing:inherit;
    transition:opacity 0.15s ease, color 0.15s ease;
  }
  .lang-toggle .lang-opt:hover{opacity:0.85}
  .lang-toggle .lang-opt.is-active{opacity:1;color:var(--copper-ink);font-weight:500}
  .lang-toggle .lang-sep{opacity:0.35}

  /* ── Hero ── */
  .hero{padding:84px 0 72px;position:relative;overflow:hidden}
  .hero .wrap{display:grid;grid-template-columns:1.15fr 1fr;gap:64px;align-items:end}
  .hero h1{
    font-size:clamp(48px,6.2vw,92px);
    line-height:0.98;letter-spacing:-0.025em;font-weight:400;
  }
  html[lang="ru"] .hero h1{font-size:clamp(38px,4.6vw,64px);letter-spacing:-0.02em}
  .hero h1 em{font-style:italic;color:var(--copper-ink);font-weight:400}
  .hero .lede{max-width:520px;margin-top:28px;font-size:18px;line-height:1.55;color:var(--ink)}
  .young-flag{
    display:inline-flex;align-items:center;gap:10px;
    margin-bottom:28px;padding:7px 12px;
    border:1px solid var(--rule);border-radius:999px;
    color:var(--copper-ink);background:rgba(244,239,230,0.4);
    font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  }
  .young-flag .dot{
    width:6px;height:6px;border-radius:50%;background:var(--copper);
    animation:pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 var(--copper);opacity:1}
    70%{box-shadow:0 0 0 7px rgba(0,0,0,0);opacity:0.9}
    100%{box-shadow:0 0 0 0 rgba(0,0,0,0);opacity:1}
  }
  .hero-img{
    aspect-ratio:4/5;border-radius:2px;position:relative;overflow:hidden;
    background:var(--paper-2);border:1px solid var(--rule);
  }
  .hero-img .cap{
    position:absolute;left:14px;bottom:14px;
    font-family:var(--mono);font-size:10px;letter-spacing:0.1em;
    color:var(--ink);background:var(--paper);padding:6px 10px;border:1px solid var(--rule);
  }
  .hero-img.hero-photo{aspect-ratio:1/1;background:var(--ink)}
  .hero-img.hero-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
  .hero-photo-main{background-image:url('images/hero-students.jpg');background-size:cover;background-position:center top}
  .about-photo-main{background-image:url('assets/about-researchers.jpg');background-size:cover;background-position:center center}

  /* ── Research grid ── */
  section.block{padding:96px 0}
  section[id]{scroll-margin-top:88px}
  #research{scroll-margin-top:45px}
  #join{scroll-margin-top:0}
  .section-head{display:flex;flex-direction:column;gap:24px;margin-bottom:56px}
  .section-head h2{font-size:clamp(32px,3.6vw,46px);letter-spacing:-0.02em;line-height:1.06;font-weight:400;text-wrap:balance}
  .section-head .desc{color:var(--ink);font-size:18px;line-height:1.55;max-width:640px;margin:0}
  .section-head .desc.wide{max-width:none}

  .research{
    display:grid;grid-template-columns:repeat(12,1fr);gap:1px;
    background:var(--rule);
    border:1px solid var(--rule);
  }
  .r-card{
    background:var(--paper);color:var(--ink);
    padding:28px 24px;display:flex;flex-direction:column;gap:14px;
    cursor:default;transition:background 0.2s ease, color 0.2s ease;
    position:relative;min-height:280px;
  }
  .r-card:hover{background:var(--ink);color:var(--paper)}
  .r-card .r-num{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--muted);transition:color 0.2s ease}
  .r-card:hover .r-num,.r-card:hover .r-sub{color:rgba(244,239,230,0.7)}
  .r-card.span-4{grid-column:span 4}
  .r-card.span-6{grid-column:span 6}
  .r-card.span-3{grid-column:span 3}
  .r-card h3{font-size:24px;line-height:1.1;letter-spacing:-0.01em;font-weight:500}
  .r-card .r-sub{font-size:13.5px;color:var(--muted);line-height:1.55;flex:1;transition:color 0.2s ease}

  /* ── About ── */
  .about-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:64px;align-items:start}
  .about-img.hero-img{aspect-ratio:1/1;width:100%}
  #about-img{scroll-margin-top:130px}
  .hero-img .badge{
    position:absolute;right:14px;top:14px;
    font-family:var(--mono);font-size:10px;letter-spacing:0.12em;
    color:var(--paper);background:var(--ink);padding:6px 10px;
  }

  /* ── Join us ── */
  .join{background:var(--ink);color:var(--paper);padding:120px 0 64px;border-top:1px solid var(--ink-2)}
  .join-head{display:flex;flex-direction:column;gap:32px;align-items:flex-start;margin-bottom:72px}
  .join-head h2{font-family:var(--serif);font-size:clamp(40px,4.8vw,68px);line-height:1.02;letter-spacing:-0.02em;font-weight:400;margin:0}
  .join-desc{color:rgba(244,239,230,0.78);font-size:18px;line-height:1.55;margin:0}

  .roles{list-style:none;padding:0;margin:0;border-top:1px solid rgba(244,239,230,0.16)}
  .role{
    display:grid;grid-template-columns:170px minmax(0,1.4fr) minmax(0,1fr) 32px;
    gap:32px;align-items:center;
    padding:28px 0;border-bottom:1px solid rgba(244,239,230,0.16);
    cursor:default;position:relative;transition:padding-left 0.25s ease;
  }
  .role:hover{padding-left:14px}
  .role-link{position:absolute;inset:0;z-index:2;text-indent:-9999px;overflow:hidden}
  .role::before{content:"";position:absolute;left:0;top:0;bottom:0;width:0;background:var(--copper);transition:width 0.25s ease}
  .role:hover::before{width:4px}
  .role-kind{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:rgba(244,239,230,0.55);text-transform:uppercase}
  .role-title{font-family:var(--serif);font-size:24px;line-height:1.2;letter-spacing:-0.005em}
  .role-meta{font-size:13.5px;color:rgba(244,239,230,0.65);display:flex;gap:10px;flex-wrap:nowrap;white-space:nowrap;align-items:center}
  .role-meta .sep{color:rgba(244,239,230,0.65)}
  .role-arrow{
    width:32px;height:32px;border:1px solid rgba(244,239,230,0.4);border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    color:var(--paper);transition:transform 0.2s ease, background 0.2s ease, color 0.2s ease;
  }
  .role:hover .role-arrow{transform:translate(2px,-2px);background:var(--copper);color:var(--ink);border-color:var(--copper)}

  .join-cta{
    margin-top:64px;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;
    padding-top:48px;border-top:1px solid rgba(244,239,230,0.16);
  }
  .join-cta-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:rgba(244,239,230,0.55);text-transform:uppercase;margin-bottom:10px}
  .join-cta-headline{font-family:var(--serif);font-size:32px;line-height:1.1;letter-spacing:-0.01em;font-weight:400}
  .join-cta-sub{margin-top:8px;color:rgba(244,239,230,0.7)}
  .join-cta-btn{
    display:inline-flex;align-items:center;gap:12px;padding:18px 24px;
    background:var(--paper);color:var(--ink);
    font-family:var(--mono);font-size:13px;letter-spacing:0.06em;
    transition:transform 0.2s ease, background 0.2s ease;
  }
  .join-cta-btn:hover{background:var(--copper);transform:translateY(-1px)}

  /* ── Footer ── */
  footer.site{background:var(--ink);color:var(--paper);padding:48px 0 36px}
  footer.site .mast{display:flex;align-items:center;gap:16px;margin-bottom:20px}
  footer.site .mast svg{width:48px;height:48px}
  footer.site .mast .nm{font-family:var(--serif);font-size:20px;line-height:1.1}
  footer.site .mast .tag{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,239,230,0.5);margin-top:4px}
  footer.site address{font-style:normal;font-size:13px;line-height:1.6;color:rgba(244,239,230,0.7);max-width:320px;margin-bottom:40px}
  footer.site .bottom{
    display:flex;justify-content:space-between;align-items:center;
    padding-top:24px;border-top:1px solid rgba(244,239,230,0.14);
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.1em;color:rgba(244,239,230,0.5);text-transform:uppercase;
  }

  /* ── Responsive ── */
  @media (max-width:960px){
    .hero .wrap{grid-template-columns:1fr}
    .about-grid{grid-template-columns:1fr;gap:40px}
    .r-card.span-4,.r-card.span-6,.r-card.span-3{grid-column:span 12}
    .join-head,.join-cta{grid-template-columns:1fr}
    .role{grid-template-columns:1fr auto;gap:8px}
    .role-kind{grid-column:1 / -1;margin-bottom:4px}
    .role-meta{grid-column:1 / -1}
    header.site .wrap{padding:14px 20px}
    .wrap{padding:0 20px}
  }
</style>
</head>

// ── Lang context ───────────────────────────────────────────────────────────
const LangContext = React.createContext({ lang: "en", setLang: () => {} });
function useLang() { return React.useContext(LangContext); }

function LangProvider({ children }) {
  const [lang, setLangState] = React.useState(() => {
    try { return localStorage.getItem("ussr-lang") || "en"; } catch { return "en"; }
  });
  const setLang = React.useCallback((v) => {
    setLangState(v);
    try { localStorage.setItem("ussr-lang", v); } catch {}
    document.documentElement.lang = v;
  }, []);
  React.useEffect(() => { document.documentElement.lang = lang; }, [lang]);
  return <LangContext.Provider value={{ lang, setLang }}>{children}</LangContext.Provider>;
}

function tt(key, lang) {
  const s = STRINGS[lang] || STRINGS.en;
  return s[key] !== undefined ? s[key] : (STRINGS.en[key] !== undefined ? STRINGS.en[key] : key);
}

function Logo({ size = 48 }) {

  );
}

function MultilineText({ text }) {
  return String(text).split("\n").map((p, i) =>
    <React.Fragment key={i}>{i > 0 && <br />}{p}</React.Fragment>
  );
}

function LangToggle() {
  const { lang, setLang } = useLang();
  return (
    <div className="lang-toggle" role="group" aria-label={tt("lang_label", lang)}>
      <button type="button" className={`lang-opt ${lang === "en" ? "is-active" : ""}`}
        onClick={() => setLang("en")} aria-pressed={lang === "en"}>EN</button>
      <span className="lang-sep" aria-hidden="true">/</span>
      <button type="button" className={`lang-opt ${lang === "ru" ? "is-active" : ""}`}
        onClick={() => setLang("ru")} aria-pressed={lang === "ru"}>RU</button>
    </div>
  );
}
